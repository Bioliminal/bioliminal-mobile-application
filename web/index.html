<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Bioliminal: AI-powered movement screening and fascial chain mapping. Clinical-grade biomechanics analysis in your pocket.">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://bioliminal.app/">
  <meta property="og:title" content="Bioliminal | Redefine Movement">
  <meta property="og:description" content="AI-powered biomechanics tracing compensations to their fascial root cause.">
  <meta property="og:image" content="https://bioliminal.app/assets/og-image.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://bioliminal.app/">
  <meta property="twitter:title" content="Bioliminal | Redefine Movement">
  <meta property="twitter:description" content="AI-powered biomechanics tracing compensations to their fascial root cause.">
  <meta property="twitter:image" content="https://bioliminal.app/assets/og-image.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Bioliminal">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Bioliminal | Redefine Movement</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #0A0F1E; }
    body { font-family: 'SF Mono', 'JetBrains Mono', Menlo, Monaco, Consolas, monospace; color: #F8FAFC; }

    #bootstrap {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background:
        radial-gradient(ellipse 55% 40% at 14% 18%, rgba(56, 189, 248, 0.09) 0%, transparent 65%),
        radial-gradient(ellipse 65% 50% at 88% 86%, rgba(245, 158, 11, 0.055) 0%, transparent 70%),
        radial-gradient(ellipse 80% 60% at 50% 50%, #1A2440 0%, #0A0F1E 80%);
      z-index: 9999;
      overflow: hidden;
      opacity: 1; transition: opacity 400ms ease-out;
    }
    #bootstrap.done { opacity: 0; pointer-events: none; }

    /* Analog grain — fractal noise at low opacity, overlay blend */
    #bootstrap::before {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.92' numOctaves='2' stitchTiles='stitch'/></filter><rect width='220' height='220' filter='url(%23n)' opacity='0.6'/></svg>");
      opacity: 0.07; mix-blend-mode: overlay;
    }

    /* CRT-style hairline scanlines */
    #bootstrap::after {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      background-image: repeating-linear-gradient(
        0deg,
        transparent 0 3px,
        rgba(148, 163, 184, 0.018) 3px 4px
      );
    }

    .bl-core {
      position: relative; z-index: 2;
      display: flex; flex-direction: column; align-items: center;
    }
    .bl-mark {
      font-size: 13px; font-weight: 600;
      letter-spacing: 0.32em; color: #F8FAFC;
      margin-bottom: 28px;
    }
    .bl-scan {
      position: relative; width: 180px; height: 1px;
      background: rgba(148, 163, 184, 0.18); overflow: hidden;
    }
    .bl-scan::after {
      content: ''; position: absolute; top: 0; left: -40%;
      width: 40%; height: 100%;
      background: linear-gradient(90deg, transparent, #38BDF8, transparent);
      animation: bl-sweep 1.4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }
    .bl-meta {
      margin-top: 22px;
      font-size: 9px; letter-spacing: 0.22em;
      color: rgba(148, 163, 184, 0.5); text-transform: uppercase;
    }

    /* Registration brackets — instrument panel corners */
    .bl-corner {
      position: absolute; width: 16px; height: 16px;
      border-color: rgba(148, 163, 184, 0.22); border-style: solid; z-index: 2;
    }
    .bl-corner.tl { top: 28px; left: 28px; border-width: 1px 0 0 1px; }
    .bl-corner.tr { top: 28px; right: 28px; border-width: 1px 1px 0 0; }
    .bl-corner.bl { bottom: 28px; left: 28px; border-width: 0 0 1px 1px; }
    .bl-corner.br { bottom: 28px; right: 28px; border-width: 0 1px 1px 0; }

    @keyframes bl-sweep {
      0% { left: -40%; }
      100% { left: 100%; }
    }
    @media (prefers-reduced-motion: reduce) {
      .bl-scan::after { animation: none; opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div id="bootstrap">
    <span class="bl-corner tl"></span>
    <span class="bl-corner tr"></span>
    <span class="bl-corner bl"></span>
    <span class="bl-corner br"></span>
    <div class="bl-core">
      <div class="bl-mark">BIOLIMINAL</div>
      <div class="bl-scan"></div>
      <div class="bl-meta">// calibrating instrument</div>
    </div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('bootstrap');
      if (!el) return;
      el.classList.add('done');
      setTimeout(function () { el.remove(); }, 500);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
