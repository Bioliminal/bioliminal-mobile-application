name: auralink
description: "AI movement screening app — bridges computer vision and fascial chain science."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.0
  camera: ^0.12.0+1
  google_mlkit_pose_detection: ^0.14.1
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_storage: ^13.2.0
  pdf: ^3.10.0
  share_plus: ^13.0.0
  path_provider: ^2.1.0
  app_settings: ^7.0.0
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/reference_images/
    - assets/models/
